font = "Recursive Sans Casual Static:weight=200:size=12"
prompt = ""
match-mode = exact
fields = filename,name,generic,keywords
icons-enabled = false

anchor = center
horizontal-pad = 80
vertical-pad = 35
inner-pad = 25
lines = 10
width = 20

[colors]
prompt            = e0def4ff
input             = 908caaff
background        = 1f1d2eff
text              = e0def4ff
selection         = 403d52ff
selection-text    = e0def4ff
border            = 403d52ff
match             = f6c177ff
selection-match   = f6c177ff

[border]
width = 12
radius = 20
selection-radius = 5

[dmenu]
mode = text
